services:
  # Backend API Gateway
  backend:
    build: .
    command: python api_gateway.py
    ports:
      - "8000:8000"
    env_file: .env
    # Giúp Docker 'nhìn' thấy được Ollama đang chạy trên máy thật
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LOG_FILE=/app/logs/system.log
    volumes:
      - .:/app
      - app_logs:/app/logs

  # Chat UI cho người thân
  chat-ui:
    build: .
    command: streamlit run streamlit_app.py --server.port 8501
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  # Admin Dashboard
  admin-ui:
    build: .
    command: streamlit run admin_app.py --server.port 8502
    ports:
      - "8502:8502"
    env_file: .env
    environment:
      - LOG_FILE=/app/logs/system.log
      - BACKEND_URL=http://backend:8000
    volumes:
      - app_logs:/app/logs:ro
    depends_on:
      - backend

volumes:
  app_logs:
    driver: local